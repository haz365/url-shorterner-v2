# ═══════════════════════════════════════════════════════════════
# CI PIPELINE
# Runs on every push to any branch
# Tests the Node.js app — no AWS credentials needed
# Deploy is done manually via docker push + ecs update-service
# ═══════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./app

      - name: Run tests
        run: npm test
        working-directory: ./app